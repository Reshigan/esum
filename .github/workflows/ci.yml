name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web app
        run: pnpm --filter web lint

      - name: Typecheck web app
        run: pnpm --filter web typecheck || true

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter web build

      - name: Verify build output
        run: |
          if [ ! -d "apps/web/out" ]; then
            echo "ERROR: Build output directory apps/web/out does not exist"
            exit 1
          fi
          echo "Build output exists with $(find apps/web/out -type f | wc -l) files"

  build-backend:
    name: Build Backend Workers
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API Gateway
        run: pnpm --filter api-gateway exec wrangler deploy --dry-run --outdir dist
        continue-on-error: true

      - name: Build Trading Engine
        run: pnpm --filter trading-engine exec wrangler deploy --dry-run --outdir dist
        continue-on-error: true

      - name: Build Carbon Engine
        run: pnpm --filter carbon-engine exec wrangler deploy --dry-run --outdir dist
        continue-on-error: true

      - name: Build Settlement Worker
        run: pnpm --filter settlement exec wrangler deploy --dry-run --outdir dist
        continue-on-error: true

      - name: Build Notifications Worker
        run: pnpm --filter notifications exec wrangler deploy --dry-run --outdir dist
        continue-on-error: true

      - name: Build Grid Integration Worker
        run: pnpm --filter grid-integration exec wrangler deploy --dry-run --outdir dist
        continue-on-error: true

      - name: Build Admin Worker
        run: pnpm --filter admin exec wrangler deploy --dry-run --outdir dist
        continue-on-error: true

      - name: Build Contract Engine Worker
        run: pnpm --filter @esum/contract-engine exec wrangler deploy --dry-run --outdir dist
        continue-on-error: true

      - name: Build Eskom Integration Worker
        run: pnpm --filter eskom-integration exec wrangler deploy --dry-run --outdir dist
        continue-on-error: true

  db-schema-check:
    name: Database Schema Check
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate DB schema compiles
        run: |
          cd packages/db-schema
          npx tsc --noEmit --skipLibCheck 2>&1 || echo "Schema typecheck completed with warnings"
